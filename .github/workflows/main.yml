name: Windows RDP via Tailscale

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Connect Tailscale (Manual Windows Fix)
        shell: powershell
        run: |
          Write-Host "Downloading Tailscale..." -ForegroundColor Cyan
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          
          Write-Host "Installing Tailscale quietly..." -ForegroundColor Cyan
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait -NoNewWindow
          
          Write-Host "Waiting for Tailscale service to start..." -ForegroundColor Cyan
          Start-Sleep -Seconds 10
          
          Write-Host "Authenticating to Tailnet..." -ForegroundColor Cyan
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" --unattended

      - name: Create User 'raju' and Enable RDP
        shell: powershell
        run: |
          Write-Host "Creating user 'raju'..." -ForegroundColor Cyan
          $Password = ConvertTo-SecureString "${{ secrets.RAJU_PASSWORD }}" -AsPlainText -Force
          New-LocalUser -Name "raju" -Password $Password -FullName "Raju RDP"
          
          Write-Host "Adding 'raju' to Administrators and RDP groups..." -ForegroundColor Cyan
          Add-LocalGroupMember -Group "Administrators" -Member "raju"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "raju"
          
          Write-Host "Enabling Remote Desktop..." -ForegroundColor Cyan
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -value 1
          
          Write-Host "Setup Complete!" -ForegroundColor Green

      - name: Get Tailscale IP
        shell: powershell
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "========================================="
          Write-Host "Connect to RDP using:"
          Write-Host "IP Address: $ip"
          Write-Host "Username: raju"
          Write-Host "Password: <Your RAJU_PASSWORD Secret>"
          Write-Host "========================================="

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Keeping the GitHub Action alive. You can now connect."
          while ($true) { Start-Sleep -Seconds 300 }
          
